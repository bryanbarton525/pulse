apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pulse.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - services
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - canary.iambarton.com
  resources:
  - httpcanaries
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - canary.iambarton.com
  resources:
  - httpcanaries/finalizers
  verbs:
  - update
- apiGroups:
  - canary.iambarton.com
  resources:
  - httpcanaries/status
  verbs:
  - get
  - patch
  - update
