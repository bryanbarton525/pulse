name: Publish Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CONTROLLER_IMAGE_NAME: bryanbarton525/pulse-controller
  PROBE_RUNNER_IMAGE_NAME: bryanbarton525/pulse-probe-runner

jobs:
  publish:
    name: Build and Publish Images
    runs-on: ubuntu-latest

    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract controller image metadata
        id: controller-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.CONTROLLER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Extract probe runner image metadata
        id: probe-runner-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROBE_RUNNER_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.controller-meta.outputs.tags }}
          labels: ${{ steps.controller-meta.outputs.labels }}

      - name: Build and push probe runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.proberunner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.probe-runner-meta.outputs.tags }}
          labels: ${{ steps.probe-runner-meta.outputs.labels }}
