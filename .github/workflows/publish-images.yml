name: Publish Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CONTROLLER_IMAGE_BASENAME: pulse-controller
  PROBE_RUNNER_IMAGE_BASENAME: pulse-probe-runner

jobs:
  publish:
    name: Build and Publish Images
    runs-on: ubuntu-latest

    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Derive image repository names
        id: image-names
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "controller=${{ env.REGISTRY }}/${owner}/${{ env.CONTROLLER_IMAGE_BASENAME }}" >> "$GITHUB_OUTPUT"
          echo "probe_runner=${{ env.REGISTRY }}/${owner}/${{ env.PROBE_RUNNER_IMAGE_BASENAME }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry with PAT
        if: ${{ secrets.GHCR_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log in to GitHub Container Registry with GITHUB_TOKEN
        if: ${{ secrets.GHCR_TOKEN == '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract controller image metadata
        id: controller-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.controller }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Extract probe runner image metadata
        id: probe-runner-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-names.outputs.probe_runner }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.controller-meta.outputs.tags }}
          labels: ${{ steps.controller-meta.outputs.labels }}

      - name: Build and push probe runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.proberunner
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.probe-runner-meta.outputs.tags }}
          labels: ${{ steps.probe-runner-meta.outputs.labels }}

  release:
    name: Create Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Derive controller image name
        id: image-names
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "controller=${{ env.REGISTRY }}/${owner}/${{ env.CONTROLLER_IMAGE_BASENAME }}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
          IMG: ${{ steps.image-names.outputs.controller }}:${{ github.ref_name }}
        run: |
          set -euo pipefail
          RELEASE_VERSION="${VERSION#v}"

          make build-installer
          cp config/crd/bases/canary.iambarton.com_httpcanaries.yaml dist/chart/crds/httpcanaries.canary.iambarton.com.yaml

          perl -0pi -e "s/^version:\s+.*/version: ${RELEASE_VERSION}/m; s/^appVersion:\s+.*$/appVersion: \"${RELEASE_VERSION}\"/m" dist/chart/Chart.yaml

          mkdir -p dist/releases
          helm package dist/chart --destination dist/releases
          cp dist/install.yaml "dist/releases/pulse-install-${VERSION}.yaml"
          sha256sum dist/releases/* > dist/releases/checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/releases/pulse-install-${{ github.ref_name }}.yaml
            dist/releases/pulse-*.tgz
            dist/releases/checksums.txt
