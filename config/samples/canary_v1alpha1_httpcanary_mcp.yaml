apiVersion: v1
kind: Secret
metadata:
  name: sample-mcp-auth
  namespace: default
type: Opaque
stringData:
  token: replace-me
---
apiVersion: canary.iambarton.com/v1alpha1
kind: HttpCanary
metadata:
  name: sample-mcp-tools
  namespace: default
spec:
  url: https://mcp.example.com/mcp
  interval: 30
  auth:
    type: bearer
    bearer:
      tokenSecretRef:
        name: sample-mcp-auth
        key: token
  headers:
    Accept: application/json, text/event-stream
  mcp:
    protocolVersion: "2025-11-25"
    clientName: pulse
    clientVersion: 0.1.0
    requireToolsCapability: true
    minToolCount: 1
    requiredTools:
      - health.check
  outputs:
    - type: prometheus
    - type: stdout
